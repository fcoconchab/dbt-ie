="label" style="color:#153360 !important" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div style="color: rgb(21, 51, 96) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#153360 !important" class="nodeLabel"><p><b>view</b><br />Re-runs SQL on every query<br />Always fresh · no storage cost<br />Slow on large datasets</p></span></div></foreignObject></g></g><g class="node default table" id="my-svg-flowchart-T-1" data-look="classic" transform="translate(448, 95)"><rect class="basic label-container" style="fill:#e8e2d5 !important;stroke:#153360 !important;stroke-width:1.5px !important" x="-130" y="-75" width="260" height="150"/><g class="label" style="color:#153360 !important" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div style="color: rgb(21, 51, 96) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#153360 !important" class="nodeLabel"><p><b>table</b><br />Full rebuild on each run<br />Fast queries · stale until run<br />Expensive on large datasets</p></span></div></foreignObject></g></g><g class="node default eph" id="my-svg-flowchart-E-2" data-look="classic" transform="translate(758, 95)"><rect class="basic label-container" style="fill:#e8e2d5 !important;stroke:#7a8599 !important;stroke-width:1px !important;stroke-dasharray:4 3 !important" x="-130" y="-87" width="260" height="174"/><g class="label" style="color:#1a1f2e !important" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div style="color: rgb(26, 31, 46) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#1a1f2e !important" class="nodeLabel"><p><b>ephemeral</b><br />Compiles to an inline CTE<br />No storage · no direct queries<br />Zero overhead at query time</p></span></div></foreignObject></g></g><g class="node default incr" id="my-svg-flowchart-I-3" data-look="classic" transform="translate(1068, 95)"><rect class="basic label-container" style="fill:#153360 !important;stroke:#153360 !important;stroke-width:2px !important" x="-130" y="-87" width="260" height="174"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -72)"><rect/><foreignObject width="200" height="144"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel"><p><b>incremental</b><br />Appends / merges new rows only<br />Fastest builds on large tables<br />Requires unique_key</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>