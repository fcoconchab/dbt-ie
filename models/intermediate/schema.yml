version: 2

models:

  - name: int_customers_enriched
    description: "One row per customer with segment info, full name, and email domain."
    columns:
      - name: customer_id
        description: "Primary key — one row per customer."
        tests:
          - unique
          - not_null
      - name: segment_id
        description: "Foreign key to segments seed."
        tests:
          - not_null
          - relationships:
              to: ref('segments')
              field: segment_id

  - name: int_order_items_summary
    description: "One row per order with item counts and revenue metrics."
    columns:
      - name: order_id
        description: "Primary key — one row per order."
        tests:
          - unique
          - not_null

  - name: int_orders_with_items
    description: "One row per order combining order header with item summary."
    columns:
      - name: order_id
        description: "Primary key — one row per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: int_order_shipping_status
    description: "One row per order with shipping timing and performance bucket."
    columns:
      - name: order_id
        description: "Primary key — one row per order."
        tests:
          - unique
          - not_null

  - name: int_payments_by_order
    description: "One row per order with payment summary and status."
    columns:
      - name: order_id
        description: "Primary key — one row per order."
        tests:
          - unique
          - not_null

  - name: int_orders_enriched
    description: "One row per order — full picture across items, shipping, and payments."
    columns:
      - name: order_id
        description: "Primary key — unique per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: int_customer_order_sequence
    description: "One row per order with customer sequence number and days since previous order."
    columns:
      - name: order_id
        description: "Primary key — one row per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id