version: 2

models:

  - name: int_customers_enriched
    description: >
      One row per customer. Joins stg_customers to the segments seed and adds full_name,
      email_domain, and is_segment_matched. Customers with no matching segment are kept
      in the output rather than dropped, so the data quality issue is visible downstream
      instead of silently removing real customers from analysis.
    columns:
      - name: customer_id
        description: "Primary key. One row per customer."
        tests:
          - unique
          - not_null
      - name: full_name
        description: "First and last name concatenated. Derived here so marts do not repeat it."
      - name: email_domain
        description: "The part of the email address after the @ symbol."
      - name: segment_id
        description: "Foreign key to the segments seed. Null when is_segment_matched is false."
        tests:
          - not_null
          - relationships:
              to: ref('segments')
              field: segment_id
      - name: is_segment_matched
        description: >
          True when the customer's segment label was found in the segments seed. False means
          the segment value in the source does not match any known segment and needs investigation.

  - name: int_order_items_summary
    description: >
      One row per order. Aggregates stg_order_items from item-grain to order-grain so it
      can be joined safely to stg_orders. Without this step, joining raw item records to
      orders would produce one row per item and corrupt every total and count downstream.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: gross_item_revenue
        description: "Sum of unit_price times quantity across all items. Pre-discount."
      - name: net_item_revenue
        description: "Sum of total_price across all items. Post-discount."
      - name: avg_unit_price
        description: >
          Gross item revenue divided by total quantity. Useful for spotting orders with
          unusually high or low average prices that might indicate a data issue.

  - name: int_orders_with_items
    description: >
      One row per order. Joins stg_orders to int_order_items_summary. stg_orders drives
      the grain so all orders appear in the output even with no items. revenue_variance
      exposes the gap between the order header subtotal and the calculated item revenue
      so data quality issues do not go unnoticed.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: has_order_items
        description: "True when at least one item record exists for this order in stg_order_items."
      - name: revenue_variance
        description: >
          Subtotal minus net_item_revenue. A non-zero value means the order header and the
          sum of line items do not agree, which may indicate a manual adjustment or a data issue.

  - name: int_order_shipping_status
    description: >
      One row per order. Joins stg_orders to stg_shipping and computes shipping timing and
      performance. Lateness is based on delivery date because the customer experience depends
      on when the parcel arrived, not when it left the warehouse. Orders still in transit are
      not marked late since the actual delivery is not yet known.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: is_late
        description: >
          True when actual_delivery is confirmed and is after estimated_delivery. False for
          on-time deliveries, early deliveries, and orders not yet delivered.
      - name: is_delivered
        description: >
          True when actual_delivery is not null. Separates completed delivery journeys from
          orders still in transit so performance metrics are only run on finished shipments.
      - name: days_late
        description: >
          Days between estimated and actual delivery. Positive means late, negative means early.
          Null when actual_delivery is missing.
      - name: shipping_performance_bucket
        description: "not_shipped, early, on_time, late, or unknown for orders shipped but not yet delivered."
        tests:
          - accepted_values:
              values: ['not_shipped', 'early', 'on_time', 'late', 'unknown']

  - name: int_payments_by_order
    description: >
      One row per order. Aggregates stg_payments to order-grain. Only completed payments
      count toward total_paid_amount. Refunded or failed payments are excluded from revenue
      but flagged through has_payment_issue so customer support can identify checkout friction.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: total_paid_amount
        description: "Sum of amounts for completed payments only. Does not include failed or refunded records."
      - name: has_successful_payment
        description: "True when at least one payment record has status completed."
      - name: has_payment_issue
        description: >
          True when at least one payment record did not complete. This is true even when a
          later attempt succeeded, making it useful for identifying orders with checkout friction.
      - name: payment_status_summary
        description: "paid, partially_paid, unpaid, or unknown based on the ratio of completed to total payments."
        tests:
          - accepted_values:
              values: ['paid', 'partially_paid', 'unpaid', 'unknown']

  - name: int_orders_enriched
    description: >
      One row per order. The main order-level source of truth. Combines int_orders_with_items
      with shipping and payment metrics so marts do not have to repeat those joins themselves.
      Business flags and order_value_tier are defined here once so every downstream model
      uses the same definition without copy-pasting the logic.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: is_completed_order
        description: "True when order status is completed."
      - name: is_cancelled_order
        description: "True when order status is cancelled."
      - name: is_refunded_order
        description: "True when order status is refunded."
      - name: is_paid
        description: "True when at least one completed payment exists for this order."
      - name: is_late
        description: "True when the order was delivered after the estimated delivery date."
      - name: is_delivered
        description: "True when actual_delivery is not null."
      - name: has_payment_issue
        description: "True when at least one payment attempt did not complete successfully."
      - name: order_value_tier
        description: "low for orders under 50, medium for 50 to under 200, high for 200 and above."
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high']

  - name: int_customer_order_sequence
    description: >
      One row per order with customer sequence context. Numbers each customer's orders
      chronologically using window functions and calculates days between purchases. All
      orders are included regardless of status. Ties on order_date are broken by order_id
      for consistent results. customer_lifecycle_stage is defined here so retention models
      do not have to repeat the classification.
    columns:
      - name: order_id
        description: "Primary key. One row per order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: customer_order_number
        description: "Sequential order number for this customer starting at 1. Ties broken by order_id."
      - name: is_first_order
        description: "True when customer_order_number is 1."
      - name: previous_order_date
        description: "Date of the customer's previous order. Null for their first order."
      - name: days_since_previous_order
        description: "Days between this order and the previous one. Null for first orders."
      - name: customer_lifecycle_stage
        description: "new for the first order, returning for the 2nd and 3rd, loyal for the 4th onward."
        tests:
          - accepted_values:
              values: ['new', 'returning', 'loyal']