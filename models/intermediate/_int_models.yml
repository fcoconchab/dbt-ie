version: 2

models:
  - name: int_orders_enriched
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'completed', 'cancelled', 'refunded']
      - name: is_completed_order
        tests:
          - not_null
      - name: is_cancelled_order
        tests:
          - not_null
      - name: is_refunded_order
        tests:
          - not_null

  - name: int_payments_by_order
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: payment_status_summary
        tests:
          - accepted_values:
              values: ['paid', 'partially_paid', 'unpaid', 'unknown']

  - name: int_order_shipping_status
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: shipping_performance_bucket
        tests:
          - accepted_values:
              values: ['early', 'on_time', 'late', 'not_shipped', 'unknown']
