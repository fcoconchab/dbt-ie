version: 2

models:
  - name: stg_categories
    description: "Cleaned product categories from raw source."
    columns:
      - name: category_id
        description: "Primary key — unique identifier for each category."
        tests:
          - unique
          - not_null

  - name: stg_customer_addresses
    description: "Cleaned customer address records."
    columns:
      - name: address_id
        description: "Primary key — unique identifier for each address."
        tests:
          - unique
          - not_null

  - name: stg_customers
    description: "Cleaned customer records from raw source."
    columns:
      - name: customer_id
        description: "Primary key — unique identifier for each customer."
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['Bronze', 'Silver', 'Gold', 'Platinum']

  - name: stg_inventory
    description: "Cleaned inventory records. One row per product per warehouse."
    columns:
      - name: product_id
        description: "Not unique alone — grain is product_id + warehouse."
        tests:
          - not_null

  - name: stg_marketing_campaigns
    description: "Cleaned marketing campaign data."
    columns:
      - name: campaign_id
        description: "Primary key — unique identifier for each campaign."
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Cleaned line-item records for each order."
    columns:
      - name: order_item_id
        description: "Primary key — unique identifier for each order line item."
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null

  - name: stg_orders
    description: "Cleaned order header records."
    columns:
      - name: order_id
        description: "Primary key — unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'completed', 'cancelled', 'refunded']
      - name: total_amount
        tests:
          - not_null
          - is_positive:
              where: "status in ('completed', 'shipped')"

  - name: stg_payments
    description: "Cleaned payment transaction records."
    columns:
      - name: payment_id
        description: "Primary key — unique string identifier for each payment."
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'failed', 'refunded']

  - name: stg_products
    description: "Cleaned product catalog data."
    columns:
      - name: product_id
        description: "Primary key — unique identifier for each product."
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['active', 'discontinued', 'out_of_stock']

  - name: stg_returns
    description: "Cleaned product return records."
    columns:
      - name: return_id
        description: "Primary key — unique identifier for each return."
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: return_status
        tests:
          - accepted_values:
              values: ['pending', 'approved', 'rejected', 'processed']

  - name: stg_reviews
    description: "Cleaned customer review records."
    columns:
      - name: review_id
        description: "Primary key — unique identifier for each review."
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
      - name: rating
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_shipping
    description: "Cleaned shipment records. One row per order."
    columns:
      - name: order_id
        description: "Primary key — one shipment record per order."
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: shipping_status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'in_transit', 'delivered', 'returned']

  - name: stg_suppliers
    description: "Cleaned supplier data."
    columns:
      - name: supplier_id
        description: "Primary key — unique identifier for each supplier."
        tests:
          - unique
          - not_null

  - name: stg_website_sessions
    description: "Cleaned website session records."
    columns:
      - name: session_id
        description: "Primary key — unique string identifier for each web session."
        tests:
          - unique
          - not_null