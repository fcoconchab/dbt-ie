version: 2

models:
  - name: stg_marketing_campaigns
    description: Marketing campaign definitions including budget, reach, and conversion metrics.
    columns:
      - name: campaign_id
        description: Primary key for the campaign.
        tests:
          - unique
          - not_null
      - name: campaign_name
        description: Human-readable name of the campaign.
      - name: campaign_type
        description: Category of campaign (e.g., email, social, paid search).
      - name: channel
        description: Distribution channel used for the campaign.
      - name: start_date
        description: Date when the campaign became active.
      - name: end_date
        description: Date when the campaign ended or is scheduled to end.
      - name: budget
        description: Total allocated spend for the campaign in the reporting currency.
      - name: target_audience
        description: Description of the intended audience segment.
      - name: expected_impressions
        description: Projected number of ad impressions before the campaign ran.
      - name: actual_impressions
        description: Actual number of impressions delivered.
      - name: clicks
        description: Number of clicks generated by the campaign.
      - name: conversions
        description: Number of purchase conversions attributed to the campaign.
      - name: status
        description: Current state of the campaign (e.g., active, paused, completed).
