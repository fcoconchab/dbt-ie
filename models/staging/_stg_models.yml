version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'completed', 'cancelled', 'refunded']
      - name: total_amount
        tests:
          - not_null
          - is_positive:
              # dbt lets you scope any test with a where clause.
              # Cancelled and refunded orders legitimately have total_amount = 0,
              # so we only enforce positivity on orders that should have a value.
              where: "status in ('completed', 'shipped')"

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['Bronze', 'Silver', 'Gold', 'Platinum']

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'pending', 'failed', 'refunded']

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['active', 'discontinued', 'out_of_stock']

  - name: stg_reviews
    columns:
      - name: review_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
      - name: rating
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_shipping
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: shipping_status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'in_transit', 'delivered', 'returned']

  - name: stg_returns
    columns:
      - name: return_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: return_status
        tests:
          - accepted_values:
              values: ['pending', 'approved', 'rejected', 'processed']

  - name: stg_categories
    columns:
      - name: category_id
        tests:
          - unique
          - not_null
