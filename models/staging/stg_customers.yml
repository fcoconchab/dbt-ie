version: 2

models:
  - name: stg_customers
    description: Core customer records sourced from the raw customers table.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: email
        description: Customer's email address; used as a unique identifier across the platform.
        tests:
          - unique
          - not_null
      - name: country
        description: Country where the customer is located.
      - name: customer_segment
        description: Marketing segment assigned to the customer.
        tests:
          - accepted_values:
              values: ['Bronze', 'Silver', 'Gold', 'Platinum']
