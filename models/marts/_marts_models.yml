version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['Bronze', 'Silver', 'Gold', 'Platinum']

  - name: mart_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: status
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'completed', 'cancelled', 'refunded']

  - name: mart_customer_rfm
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: segment
        tests:
          - not_null
          - accepted_values:
              values: ['champion', 'loyal', 'at_risk', 'lost']
      - name: rfm_score
        tests:
          - not_null
          - is_positive
      - name: recency_days
        tests:
          - not_null
          - is_positive
      - name: monetary
        tests:
          - is_positive

  - name: mart_product_review_summary
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: review_tier
        tests:
          - not_null
          - accepted_values:
              values: ['well_reviewed', 'mixed', 'poorly_reviewed']
      - name: avg_rating
        tests:
          - not_null

  - name: mart_payment_method_breakdown
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: mart_monthly_revenue
    columns:
      - name: order_month
        tests:
          - unique
          - not_null

  - name: mart_shipping_performance
    columns:
      - name: carrier
        tests:
          - not_null
      - name: on_time_rate
        tests:
          - not_null

  - name: mart_repeat_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
